<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In – Noteracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans', sans-serif;
      background: #111820;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .login-wrap {
      width: 100%;
      max-width: 420px;
      padding: 0 1.25rem;
    }

    .login-card {
      background: #1c2228;
      border-radius: 16px;
      padding: 2.5rem 2rem;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .logo-area {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo-area a {
      text-decoration: none;
    }

    .logo-text {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 3px;
      color: #d7d7d7;
      text-transform: uppercase;
    }

    .logo-sub {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 4px;
      color: #e6b802;
      text-transform: uppercase;
      margin-top: -2px;
    }

    .login-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 0.35rem;
    }

    .login-subtitle {
      font-size: 14px;
      color: #8a929a;
      margin-bottom: 1.75rem;
    }

    .field {
      margin-bottom: 1.25rem;
    }

    .field label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .input-wrap {
      position: relative;
    }

    .field input[type="email"],
    .field input[type="password"],
    .field input[type="text"] {
      width: 100%;
      background: #252b30;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      padding: 0.8rem 1rem;
      font-size: 14px;
      color: #fff;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus {
      border-color: #e6b802;
    }

    .field input::placeholder {
      color: #555d65;
    }

    .pw-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #555d65;
      cursor: pointer;
      font-size: 16px;
      padding: 4px;
    }

    .pw-toggle:hover {
      color: #8a929a;
    }

    .options-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      font-size: 13px;
    }

    .remember-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      color: #8a929a;
    }

    .remember-label input[type="checkbox"] {
      accent-color: #e6b802;
      width: 15px;
      height: 15px;
    }

    .forgot-link {
      color: #e6b802;
      text-decoration: none;
      font-weight: 500;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }

    .btn-signin {
      width: 100%;
      background: #e6b802;
      color: #111820;
      border: none;
      border-radius: 22px;
      padding: 0.9rem;
      font-size: 16px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 1.25rem;
    }

    .btn-signin:hover {
      background: #f5c803;
      box-shadow: 0 6px 16px rgba(230,184,2,0.35);
    }

    .btn-signin:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .signup-row {
      text-align: center;
      font-size: 14px;
      color: #8a929a;
    }

    .signup-row a {
      color: #e6b802;
      text-decoration: none;
      font-weight: 600;
    }

    .signup-row a:hover {
      text-decoration: underline;
    }

    .error-msg {
      background: rgba(220,53,69,0.12);
      border: 1px solid rgba(220,53,69,0.3);
      color: #f0a0a8;
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 13px;
      margin-bottom: 1rem;
      display: none;
    }

    /* 2FA Panel */
    .panel-2fa {
      display: none;
      text-align: center;
    }

    .panel-2fa .shield-icon {
      font-size: 40px;
      margin-bottom: 1rem;
    }

    .panel-2fa h2 {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 0.35rem;
    }

    .panel-2fa p {
      font-size: 13px;
      color: #8a929a;
      margin-bottom: 1.5rem;
    }

    .otp-row {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .otp-cell {
      width: 44px;
      height: 52px;
      background: #252b30;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px;
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      color: #fff;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    .otp-cell:focus {
      border-color: #e6b802;
    }

    .btn-back {
      background: none;
      border: none;
      color: #8a929a;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      margin-top: 0.75rem;
    }

    .btn-back:hover {
      color: #fff;
    }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid transparent;
      border-top-color: #111820;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .footer-copy {
      text-align: center;
      font-size: 12px;
      color: #4a5260;
      margin-top: 2rem;
      padding-bottom: 1.5rem;
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 2rem 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <!-- Logo -->
      <div class="logo-area">
        <a href="/index.html">
          <div class="logo-text">Noteracker</div>
          <div class="logo-sub">Studio</div>
        </a>
      </div>

      <!-- Login Panel -->
      <div id="p-login">
        <h1 class="login-title">Welcome back</h1>
        <p class="login-subtitle">Sign in to your account</p>

        <div class="error-msg" id="err-msg"></div>

        <form id="loginForm" onsubmit="return false;">
          <div class="field">
            <label for="f-email">Email</label>
            <input type="email" id="f-email" placeholder="your@email.com" required autocomplete="email">
          </div>

          <div class="field">
            <label for="f-pw">Password</label>
            <div class="input-wrap">
              <input type="password" id="f-pw" placeholder="Enter your password" required autocomplete="current-password">
              <button type="button" class="pw-toggle" onclick="togglePw()">
                <svg id="eye-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
          </div>

          <div class="options-row">
            <label class="remember-label">
              <input type="checkbox" id="f-rem"> Remember me
            </label>
            <a href="https://noteracker.com/forgot-password" class="forgot-link">Forgot password?</a>
          </div>

          <button type="submit" class="btn-signin" id="btn-login">Sign In</button>
        </form>

        <div class="signup-row">
          New to Noteracker? <a href="https://noteracker.com/join">Create free account</a>
        </div>
      </div>

      <!-- 2FA Panel -->
      <div class="panel-2fa" id="p-2fa">
        <div class="shield-icon">🛡️</div>
        <h2>Two-Factor Auth</h2>
        <p>Enter the 6-digit code from<br>your authenticator app</p>

        <div class="otp-row">
          <input type="text" maxlength="1" class="otp-cell" data-idx="0" inputmode="numeric">
          <input type="text" maxlength="1" class="otp-cell" data-idx="1" inputmode="numeric">
          <input type="text" maxlength="1" class="otp-cell" data-idx="2" inputmode="numeric">
          <input type="text" maxlength="1" class="otp-cell" data-idx="3" inputmode="numeric">
          <input type="text" maxlength="1" class="otp-cell" data-idx="4" inputmode="numeric">
          <input type="text" maxlength="1" class="otp-cell" data-idx="5" inputmode="numeric">
        </div>

        <button type="button" class="btn-signin" id="btn-2fa">Verify Code</button>
        <button type="button" class="btn-back" onclick="show2FA(false)">← Back to login</button>
      </div>
    </div>

    <div class="footer-copy">
      &copy; 2026 Noteracker Ltd. &middot; England &amp; Wales No.17030247
    </div>
  </div>

  <script>
    var API = 'https://noteracker.com/api/auth';
    var loginToken = null;

    // Toggle password visibility
    function togglePw() {
      var pw = document.getElementById('f-pw');
      pw.type = pw.type === 'password' ? 'text' : 'password';
    }

    // Show/hide 2FA panel
    function show2FA(show) {
      document.getElementById('p-login').style.display = show ? 'none' : 'block';
      document.getElementById('p-2fa').style.display = show ? 'block' : 'none';
      if (show) document.querySelector('.otp-cell').focus();
    }

    // Show error
    function showErr(msg) {
      var el = document.getElementById('err-msg');
      el.textContent = msg;
      el.style.display = msg ? 'block' : 'none';
    }

    // Login submit
    document.getElementById('loginForm').addEventListener('submit', async function() {
      var btn = document.getElementById('btn-login');
      var email = document.getElementById('f-email').value.trim();
      var pw = document.getElementById('f-pw').value;
      var rem = document.getElementById('f-rem').checked;

      if (!email || !pw) return showErr('Please fill in all fields.');
      showErr('');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Signing in...';

      try {
        var res = await fetch(API + '/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ email: email, password: pw, remember: rem })
        });
        var data = await res.json();

        if (data.requires2FA) {
          loginToken = data.token || null;
          show2FA(true);
        } else if (data.success || res.ok) {
          window.location.href = 'https://noteracker.com/my-account';
        } else {
          showErr(data.message || 'Invalid email or password.');
        }
      } catch(e) {
        showErr('Connection error. Please try again.');
      }

      btn.disabled = false;
      btn.textContent = 'Sign In';
    });

    // OTP cells navigation
    var cells = document.querySelectorAll('.otp-cell');
    cells.forEach(function(cell, i) {
      cell.addEventListener('input', function() {
        this.value = this.value.replace(/[^0-9]/g, '');
        if (this.value && i < 5) cells[i + 1].focus();
      });
      cell.addEventListener('keydown', function(e) {
        if (e.key === 'Backspace' && !this.value && i > 0) cells[i - 1].focus();
      });
    });

    // 2FA verify
    document.getElementById('btn-2fa').addEventListener('click', async function() {
      var code = '';
      cells.forEach(function(c) { code += c.value; });
      if (code.length < 6) return;

      var btn = this;
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Verifying...';

      try {
        var res = await fetch(API + '/verify-2fa', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ code: code, token: loginToken })
        });
        var data = await res.json();

        if (data.success || res.ok) {
          window.location.href = 'https://noteracker.com/my-account';
        } else {
          cells.forEach(function(c) { c.value = ''; });
          cells[0].focus();
        }
      } catch(e) {}

      btn.disabled = false;
      btn.textContent = 'Verify Code';
    });
  </script>
</body>
</html>
